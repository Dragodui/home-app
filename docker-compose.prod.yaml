services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-backend-prod
    env_file:
      - .env.prod
    depends_on:
      - redis
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: always

  redis:
    image: redis:7
    container_name: redis-cache-prod
    restart: always
    networks:
      - app-network
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus-prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data-prod:/prometheus
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        sed "s/[$$]{ADMIN_USERNAME}/$$ADMIN_USERNAME/g; s/[$$]{ADMIN_PASSWORD}/$$ADMIN_PASSWORD/g" /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        
        echo "--- Generated Config (Check this) ---"
        grep "basic_auth" -A 3 /tmp/prometheus.yml
        echo "------------------------------------"

        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.console.libraries=/etc/prometheus/console_libraries \
          --web.console.templates=/etc/prometheus/consoles \
          --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - app-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana-prod
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus

networks:
  app-network:
    driver: bridge

volumes:
  pgdata-prod:
  prometheus-data-prod:
  grafana-data-prod:
